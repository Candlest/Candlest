name: Update README Cards

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&theme=transparent
          path: profile/grs-stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&langs_count=6&hide=html,css,scss,c,asl,smt,llvm&exclude_repo=Candlest,candlest.github.io.old,ai-attack-prompt-lab,KEN-modify,Yilong15Pro-fix-keyboard,SYSU-SCST-Lab-Report-Template,typst-rednote,rigos-template,quartz-blog
          path: profile/grs-top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          if ! git diff --staged --quiet; then
            git commit -m "Update README cards"
            git pull --rebase origin "${{ github.event.repository.default_branch }}"
            git push origin "HEAD:${{ github.event.repository.default_branch }}"
          fi
